
resources:
  # Tables for these resources are defined in Python
  - name: pods
    namespaced: true
  - name: pod_statuses
    namespaced: true
  - name: jobs
    namespaced: true
  - name: cronjobs
    namespaced: true
  - name: nodes
    namespaced: false
  - name: services
    namespaced: true
  - name: deployments
    namespaced: true
  - name: events
    namespaced: true

# node_taints builtin table is done here because it doesn't have any special column extraction
# logic, and it serves as a good unit test.

create:
  - table: node_taints
    resource: nodes
    row_source:
      - items as node
      - spec.taints as taint
    columns:
      - name: node_uid
        from: metadata.uid in node
        comment: node UID, from metadata.uid
      - name: key
        from: key in taint
        comment: taint key
      - name: effect
        from: effect in taint
        comment: taint effect
